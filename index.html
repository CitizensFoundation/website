  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:alt" content="Citizens Foundation — citizens.is" />

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Citizens Foundation" />
  <meta name="twitter:description" content="Citizens Foundation builds open-source platforms for better public decisions — combining collective intelligence and AI to turn public input into action." />
  <meta name="twitter:image" content="https://citizens.is/assets/og-image.png?v=2026-06" />
